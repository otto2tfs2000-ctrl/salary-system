<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#141414;--bg2:#1e1e1e;--bg3:#282828;
  --gold:#c9a84c;--gold2:#e2c068;--gold3:#f0d898;
  --text:#ede9e0;--text2:#a8a49c;--text3:#686460;
  --border:#333;--border2:#444;
  --green:#4caf7d;--red:#e05555;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:#0d0d0d;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.logo{font-size:17px;font-weight:600;color:var(--gold)}
.logo-sub{font-size:11px;color:var(--text3);margin-top:2px}
.sync-wrap{display:flex;align-items:center;gap:7px;font-size:12px}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0;background:var(--text3)}
.dot.ok{background:var(--green)}.dot.saving{background:var(--gold);animation:pulse 1s infinite}.dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.month-nav{display:flex;align-items:center;gap:8px}
.month-nav select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:13px;cursor:pointer;outline:none;font-family:inherit}
.tabs{display:flex;background:#0d0d0d;border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto}
.tab{padding:12px 18px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap}
.tab:hover{color:var(--text)}.tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:500}
.page{display:none;padding:24px;max-width:1300px;margin:0 auto}.page.active{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin-bottom:16px}
.card-title{font-size:14px;font-weight:600;color:var(--gold2);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:14px}
.fg label{display:block;font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.fg input,.fg select{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 11px;border-radius:7px;font-size:13px;outline:none;transition:border-color 0.15s;font-family:inherit}
.fg input:focus,.fg select:focus{border-color:var(--gold)}
.btn{padding:8px 18px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.15s;font-family:inherit}
.btn-gold{background:var(--gold);color:#111}.btn-gold:hover{background:var(--gold2)}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2)}.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:5px}
.btn-del{background:transparent;border:1px solid #553;color:#a88}.btn-del:hover{background:#2a1a1a;border-color:var(--red);color:var(--red)}
.btn-dl{background:rgba(91,155,213,0.12);border:1px solid rgba(91,155,213,0.3);color:#80c0f0}.btn-dl:hover{background:rgba(91,155,213,0.22)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg3);color:var(--text3);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.b-gold{background:rgba(201,168,76,0.12);color:var(--gold2);border:1px solid rgba(201,168,76,0.25)}
.b-blue{background:rgba(91,155,213,0.12);color:#80c0f0;border:1px solid rgba(91,155,213,0.25)}
.b-purple{background:rgba(155,114,207,0.12);color:#c0a0f0;border:1px solid rgba(155,114,207,0.25)}
.b-green{background:rgba(76,175,125,0.12);color:#70e0a8;border:1px solid rgba(76,175,125,0.25)}
.b-gray{background:rgba(160,156,150,0.08);color:var(--text2);border:1px solid var(--border)}
.in-num{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 7px;border-radius:5px;width:70px;font-size:13px;text-align:center;outline:none;font-family:inherit;transition:border-color 0.15s}
.in-num:focus{border-color:var(--gold)}
.in-num.md{width:90px}.in-num.lg{width:110px}
.in-num.salary{background:rgba(201,168,76,0.06);border-color:rgba(201,168,76,0.2)}.in-num.salary:focus{border-color:var(--gold)}
.total-row td{background:rgba(201,168,76,0.06)!important;font-weight:600;color:var(--gold2);border-top:1px solid rgba(201,168,76,0.2)}
.store-tabs{display:flex;gap:8px;margin-bottom:18px}
.store-btn{padding:6px 16px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:13px;transition:all 0.15s;font-family:inherit}
.store-btn:hover{border-color:var(--gold);color:var(--gold)}
.store-btn.active{background:var(--gold);border-color:var(--gold);color:#111;font-weight:600}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg3);border-radius:10px;padding:14px 16px;border:1px solid var(--border)}
.stat-card .lbl{font-size:11px;color:var(--text3);margin-bottom:5px}
.stat-card .val{font-size:22px;font-weight:600;color:var(--gold2)}
.info-box{background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.15);border-radius:8px;padding:11px 14px;font-size:13px;color:var(--gold3);margin-bottom:16px;line-height:1.6}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.muted{color:var(--text3);font-size:12px}
.auto-val{color:var(--gold2);font-weight:500}
.zero-val{color:var(--text3)}
.loading-overlay{position:fixed;inset:0;background:rgba(14,14,14,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lock-overlay{position:fixed;inset:0;background:rgba(10,10,10,0.96);display:flex;align-items:center;justify-content:center;z-index:500}
.lock-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:36px 40px;text-align:center;max-width:320px;width:90%}
.lock-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:14px;outline:none;text-align:center;font-family:inherit;letter-spacing:2px;margin-bottom:14px}
.lock-input:focus{border-color:var(--gold)}
.day-meta{display:flex;gap:16px;flex-wrap:wrap}
.day-meta-item{display:flex;align-items:center;gap:8px;font-size:13px}
.day-meta-item label{color:var(--text3);font-size:12px}
.entry-log{background:var(--bg3);border-radius:8px;padding:12px 16px;margin-bottom:14px}
tr.dragging{opacity:0.4}
tr.drag-over td{border-top:2px solid var(--gold)!important}
tr[draggable]{cursor:grab}
</style>
</head>

<script>
const BOSS_PWD = 'Otto212707656';
const SALES_YEAR = 2026;

// в”Җв”Җ Firebase SDK еҲқе§ӢеҢ– в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const FB_CONFIG = {
  apiKey: 'AIzaSyCQYP21uHGAeSj_i6ANMexMvp3_bciHvTw',
  databaseURL: 'https://otto2-2026-default-rtdb.asia-southeast1.firebasedatabase.app',
  projectId: 'otto2-2026',
  appId: '1:108328085665:web:071a45a7d7c5af6b6468e0'
};
let fbApp2 = null;
let fbDb2 = null;
function initFB() {
  try {
    if (typeof firebase === 'undefined') {
      setTimeout(initFB, 100);
      return;
    }
    fbApp2 = firebase.initializeApp(FB_CONFIG, 'salaryApp_' + Date.now());
    fbDb2 = fbApp2.database();
    // FB еҲқе§ӢеҢ–е®ҢжҲҗеҫҢпјҢеҰӮжһңй Ғйқўе·Іијүе…Ҙе°ұиЈңжҠ“жҘӯзёҫ
    if (document.readyState === 'complete') {
      loadFirebaseSales();
    }
  } catch(e) { console.error('FB init error:', e); }
}
initFB();

const SALES_STAFF_MAP = {
  'Ethan': ['еҗіеҝ жҮӢ-Ethan', 'Ethan'],
  'еӨ§зҶҠ': ['йӮұе®—жҙІ-еӨ§зҶҠ', 'еӨ§зҶҠ'],
  'зҫҠзҫҠ': ['еҠүжҳ з§Җ-зҫҠзҫҠ', 'зҫҠзҫҠ'],
  '77': ['жһ—дәӯеӘӣ-дёғдёғ', 'дёғдёғ', '77'],
  'и“Ғи“Ғ': ['иҺҠе®ңи“Ғ-и“Ғи“Ғ', 'и“Ғи“Ғ', 'иҺҠе®ңи“Ғ'],
  'зұійӣӘ': ['еҠүиҠ·е–¬-зұійӣӘ', 'зұійӣӘ', 'еҠүиҠ·е–¬'],
  'зұіеҰ®': ['йҷіе°ҡжҪ”-зұіеҰ®', 'зұіеҰ®', 'йҷіе°ҡжҪ”'],
};

// Returns teacher name from salary system given a sales staff string
function matchStaff(salesStaff) {
  for (const [teacherName, aliases] of Object.entries(SALES_STAFF_MAP)) {
    if (aliases.some(a => salesStaff.includes(a) || a.includes(salesStaff))) {
      return teacherName;
    }
  }
  return null;
}

// Firebase sales data cache
let fbSalesData = {}; // { 'teacherName_month': amount }
let fbLoaded = false;

function loadFirebaseSales() {
  console.log('[FB] loadFirebaseSales called, fbDb2:', !!fbDb2);
  if (!fbDb2) { console.warn('[FB] fbDb2 жңӘеҲқе§ӢеҢ–'); return; }
  fbDb2.ref('salesData').once('value')
    .then(snapshot => {
      const data = snapshot.val();
      console.log('[FB] salesData received, keys:', data ? Object.keys(data) : 'null');
      if (!data) return;
      const recs = Array.isArray(data) ? data : (data.records || null);
      if (recs && recs.length > 0) {
        console.log('[FB] first record:', JSON.stringify(recs[0]));
        const ethanRecs = recs.filter(r => r.staff && r.staff.includes('Ethan') && r.month === 6);
        console.log('[FB] Ethan June records:', JSON.stringify(ethanRecs));
        console.log('[FB] total records:', recs.length);
      }
      let records = Array.isArray(data) ? data : (data.records || null);
      // Firebase жңүжҷӮжҠҠйҷЈеҲ—еӯҳжҲҗзү©д»¶пјҢз”Ё Object.values иҪүеӣһйҷЈеҲ—
      if (records && !Array.isArray(records)) records = Object.values(records);
      if (!records || !Array.isArray(records) || records.length === 0) return;
      fbSalesData = {};
      records.forEach(r => {
        if (r.voided || r.pending) return;
        const teacherName = matchStaff(r.staff || '');
        if (!teacherName) return;
        // еҲӨж–·еҲҶеә—пјҡ2FгҖҒ4F еұ¬ж——иүҰеә—пјӣеңӢең– еұ¬еңӢең–еә—
        const dept = r.dept || '';
        const storeKey = (dept === 'еңӢең–') ? 'guotu' : 'flagship';
        // жңҲеҗҲиЁҲпјҲеҗ«еҲҶеә—пјү
        const mKey = teacherName + '_' + r.month + '_' + storeKey;
        fbSalesData[mKey] = (fbSalesData[mKey] || 0) + (r.amount || 0);
        // жңҲеҗҲиЁҲпјҲдёҚеҲҶеә—пјҢдҫӣж•ҙй«”зөұиЁҲпјү
        const mKeyAll = teacherName + '_' + r.month;
        fbSalesData[mKeyAll] = (fbSalesData[mKeyAll] || 0) + (r.amount || 0);
        // ж—ҘеҗҲиЁҲпјҲеҗ«еҲҶеә—пјү
        const dKey = teacherName + '_' + r.month + '_' + r.day + '_' + storeKey;
        fbSalesData[dKey] = (fbSalesData[dKey] || 0) + (r.amount || 0);
        // ж—ҘеҗҲиЁҲпјҲдёҚеҲҶеә—пјү
        const dKeyAll = teacherName + '_' + r.month + '_' + r.day;
        fbSalesData[dKeyAll] = (fbSalesData[dKeyAll] || 0) + (r.amount || 0);
      });
      fbLoaded = true;
      console.log('[FB] fbSalesData keys:', Object.keys(fbSalesData).filter(k=>k.includes('Ethan')));
      renderAll();
    })
    .catch(e => console.error('[FB] и®ҖеҸ–еӨұж•—:', e));
}

// Get sales amount from Firebase for a teacher, month, and store
function getFBSales(teacherName, month, store) {
  if (!fbLoaded) return 0;
  const key = store
    ? teacherName + '_' + parseInt(month) + '_' + store
    : teacherName + '_' + parseInt(month);
  return fbSalesData[key] || 0;
}

// Get sales amount from Firebase for a teacher, month, day, and store
function getFBSalesByDay(teacherName, month, day, store) {
  if (!fbLoaded) return 0;
  const key = store
    ? teacherName + '_' + parseInt(month) + '_' + parseInt(day) + '_' + store
    : teacherName + '_' + parseInt(month) + '_' + parseInt(day);
  return fbSalesData[key] || 0;
}

function setSync(status, text) {
  document.getElementById('sync-dot').className = 'dot ' + status;
  const el = document.getElementById('sync-text');
  el.textContent = text;
  el.style.color = status==='ok'?'var(--green)':status==='saving'?'var(--gold)':status==='err'?'var(--red)':'var(--text3)';
}

async function loadData() {
  if (!fbDb2) {
    // fbDb2 йӮ„жІ’еҘҪпјҢзӯүдёҖдёӢеҶҚи©Ұ
    setTimeout(loadData, 200);
    return;
  }
  try {
    setSync('saving','йҖЈз·ҡдёӯ...');
    const snap = await fbDb2.ref('salaryData').once('value');
    const data = snap.val();
    if (data && typeof data === 'object') {
      S = Object.assign({ teachers:[], daily:{}, salaryBase:{} }, data);
    }
    localStorage.setItem('otto2_v7', JSON.stringify(S));
    setSync('ok','е·ІеҗҢжӯҘ');
  } catch(e) {
    console.error('loadData error:', e);
    setSync('err','дҪҝз”Ёжң¬ж©ҹиіҮж–ҷ');
    try { const d = localStorage.getItem('otto2_v7'); if(d) S = JSON.parse(d); } catch(e2) {}
  }
  document.getElementById('loading-overlay').style.display = 'none';
  loadFirebaseSales();
  renderAll();
}

async function doSave() {
  setSync('saving','е„Іеӯҳдёӯ...');
  localStorage.setItem('otto2_v7', JSON.stringify(S));
  if (!fbDb2) { setSync('err','Firebase жңӘеҲқе§ӢеҢ–'); return; }
  try {
    await fbDb2.ref('salaryData').set(S);
    setSync('ok','е·Іе„Іеӯҳ');
  } catch(e) {
    console.error('doSave error:', e);
    setSync('err','е„ІеӯҳеӨұж•—пјҲжң¬ж©ҹеӮҷд»Ҫпјү');
  }
}

function save() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, 800);
}

  return document.getElementById('selYear').value + '-' + document.getElementById('selMonth').value;

function getDaysInMonth(y, m) { return new Date(y, m, 0).getDate(); }

function initMonth() {
  const yEl = document.getElementById('selYear');
  const mEl = document.getElementById('selMonth');
  const now = new Date();
  for (let y=2024;y<=2030;y++) {
    const o = document.createElement('option');
    o.value = y; o.text = y + ' е№ҙ';
    if (y===now.getFullYear()) o.selected = true;
    yEl.appendChild(o);
  }
  ['01','02','03','04','05','06','07','08','09','10','11','12'].forEach((m,i) => {
    const o = document.createElement('option');
    o.value = m; o.text = (i+1) + ' жңҲ';
    if (i===now.getMonth()) o.selected = true;
    mEl.appendChild(o);

}

    pendingTab = tab;
    document.getElementById('lock-overlay').style.display = 'flex';
    setTimeout(() => document.getElementById('lock-pwd').focus(), 100);

function doSwitchTab(tab) {
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('active', ['daily','monthly','salary','settings'][i] === tab);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');

  if (tab==='monthly') renderMonthly();

function getTeachers(store) {

// в”Җв”Җ Daily Data в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function dayKey(store, mKey, day) {
  return mKey + '_' + store + '_' + String(day).padStart(2,'0');
}

function getDayEntries(store, mKey, day) {
  return S.daily[dayKey(store,mKey,day)]?.entries || [];
}

function getDayAgg(store, mKey, day) {
  const entries = getDayEntries(store, mKey, day);
  const r = { newCust:0, oldCust:0, teachers:{} };
  entries.forEach(e => {
    r.newCust += e.newCust || 0;
    r.oldCust += e.oldCust || 0;
    Object.keys(e.teachers||{}).forEach(tid => {
      if (!r.teachers[tid]) r.teachers[tid] = { count:0, outsideCount:0, master:0, assist:0, junior:0, sales:0 };
      const td = e.teachers[tid];
      r.teachers[tid].count        += td.count        || 0;
      r.teachers[tid].outsideCount += td.outsideCount || 0;
      r.teachers[tid].master       += td.master       || 0;
      r.teachers[tid].assist       += td.assist       || 0;
      r.teachers[tid].junior       += td.junior       || 0;
      r.teachers[tid].sales        += td.sales        || 0;
    });
  });
  return r;
}

function addEntry(store, mKey, day, entry) {
  const k = dayKey(store, mKey, day);
  if (!S.daily[k]) S.daily[k] = { entries:[] };
  if (!S.daily[k].entries) S.daily[k].entries = [];
  S.daily[k].entries.push(entry);
  save();
}

function delEntry(store, mKey, day, idx) {
  const k = dayKey(store, mKey, day);
  if (S.daily[k]?.entries) {
    S.daily[k].entries.splice(idx, 1);
    save();
    renderDaily();
  }
}

function saveEditEntry(store, mKey, day, idx) {
  var entries = getDayEntries(store, mKey, day);

  var selM_edit = parseInt(document.getElementById('selMonth').value);

  teachers.forEach(function(t) {
    var c = parseInt(document.getElementById('ee_c_' + t.id)?.value) || 0;
    var o = parseInt(document.getElementById('ee_o_' + t.id)?.value) || 0;
    var m = parseInt(document.getElementById('ee_m_' + t.id)?.value) || 0;
    var a = parseInt(document.getElementById('ee_a_' + t.id)?.value) || 0;
    var j = parseInt(document.getElementById('ee_j_' + t.id)?.value) || 0;
    var n = document.getElementById('ee_n_' + t.id)?.value || '';
    var s = getFBSalesByDay(t.name, selM_edit, day, store);

function updateFee(tid) {
  var m = parseInt(document.getElementById('inp_m_' + tid)?.value) || 0;
  var a = parseInt(document.getElementById('inp_a_' + tid)?.value) || 0;
  var j = parseInt(document.getElementById('inp_j_' + tid)?.value) || 0;
  var fee = m*2000 + a*1500 + j*1000;
  var el = document.getElementById('fee_' + tid);
  if (el) { el.textContent = fee ? '$'+fee.toLocaleString() : 'вҖ”'; el.className = fee?'auto-val':'zero-val'; }
}

function submitEntry(store, mKey, day) {
  var teachers = getTeachers(store);
  var now = new Date();
  var time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  var entry = {
    time: time,
    newCust: parseInt(document.getElementById('inp_nc')?.value) || 0,
    oldCust: parseInt(document.getElementById('inp_oc')?.value) || 0,
    note: document.getElementById('inp_en')?.value || '',
    teachers: {}
  };
  var hasData = entry.newCust || entry.oldCust;
  var selM_submit = parseInt(document.getElementById('selMonth').value);
  teachers.forEach(function(t) {
    var c = parseInt(document.getElementById('inp_c_' + t.id)?.value) || 0;
    var o = parseInt(document.getElementById('inp_o_' + t.id)?.value) || 0;
    var m = parseInt(document.getElementById('inp_m_' + t.id)?.value) || 0;
    var a = parseInt(document.getElementById('inp_a_' + t.id)?.value) || 0;
    var j = parseInt(document.getElementById('inp_j_' + t.id)?.value) || 0;
    var n = document.getElementById('inp_n_' + t.id)?.value || '';
    var s = getFBSalesByDay(t.name, selM_submit, day, store);
    var tf = parseInt(document.getElementById('inp_tf_' + t.id)?.value) || 0;
    if (c||o||m||a||j||tf) { hasData = true; entry.teachers[t.id] = {count:c,outsideCount:o,master:m,assist:a,junior:j,note:n,sales:s,trainingFee:tf}; }
  });
  if (!hasData) { alert('и«ӢиҮіе°‘еЎ«е…ҘдёҖзӯҶиіҮж–ҷ'); return; }
  addEntry(store, mKey, day, entry);
  // е„Іеӯҳз•¶ж—ҘзҮҹж”¶
  var rev = parseInt(document.getElementById('inp_rev')?.value) || 0;
  if (rev > 0) {
    var revKey = dayKey(store, mKey, day);
    if (!S.daily[revKey]) S.daily[revKey] = { entries:[] };
    S.daily[revKey].revenue = (S.daily[revKey].revenue || 0) + rev;
    save();
  }
  renderDayForm();
}

// в”Җв”Җ Monthly Aggregation в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function aggregateMonth(store, mKey) {
  var selY = parseInt(document.getElementById('selYear').value);
  var selM = parseInt(document.getElementById('selMonth').value);
  var days = getDaysInMonth(selY, selM);
  var teachers = getTeachers(store);
  var totals = { newCust:0, oldCust:0, teachers:{} };
  teachers.forEach(function(t) {
    totals.teachers[t.id] = { count:0, outsideCount:0, master:0, assist:0, junior:0, sales:0, supHours:0, supRate:0, trainingFee:0 };
  });
  for (var d=1; d<=days; d++) {
    var agg = getDayAgg(store, mKey, d);
    totals.newCust += agg.newCust;
    totals.oldCust += agg.oldCust;
    teachers.forEach(function(t) {
      var td = agg.teachers[t.id] || {};
      totals.teachers[t.id].count        += td.count        || 0;
      totals.teachers[t.id].outsideCount += td.outsideCount || 0;
      totals.teachers[t.id].master       += td.master       || 0;
      totals.teachers[t.id].assist       += td.assist       || 0;
      totals.teachers[t.id].junior       += td.junior       || 0;
      totals.teachers[t.id].sales        += td.sales        || 0;
      totals.teachers[t.id].trainingFee  += td.trainingFee  || 0;
    });
    // Mixue support hours stored at day level
    var mixue = teachers.find(function(t){ return t.name==='зұійӣӘ'; });
    if (mixue) {
      var k = dayKey(store, mKey, d);
      totals.teachers[mixue.id].supHours += S.daily[k]?.supHours || 0;
      if (S.daily[k]?.supRate) totals.teachers[mixue.id].supRate = S.daily[k].supRate;
    }
  }
  return totals;
}

// в”Җв”Җ Salary в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function calcSalary(t, store, mKey) {
  var totals = aggregateMonth(store, mKey);
  var tt = totals.teachers[t.id] || {};
  var adminAmt = store==='flagship' ? (t.adminF||0) : (t.adminG||0);
  var ptKey = 'pt_' + mKey + '_' + store;
  var ptHours = t.type==='part' ? (S.salaryBase?.[ptKey]?.[t.id] || 0) : 0;

  var countBonus = 0;
  if (t.mode === 'minni') {
    var base = Math.max(0, ptHours/2 - 3);
    countBonus = Math.max(0, Math.round(((tt.count||0) - base) * 50));
  } else if (t.mode === 'half') {
    countBonus = Math.round((tt.count||0)/2) * 50;
  } else if (t.mode === 'over') {
    countBonus = Math.max(0, (tt.count||0) - (t.threshold||0)) * 50;
  } else {
    countBonus = (tt.count||0) * 50;
  }

  var lecRate = (t.lecRate !== undefined && t.lecRate !== null && t.lecRate !== '') ? parseFloat(t.lecRate) : 1;
  var lectureFee = Math.round(((tt.master||0)*2000 + (tt.assist||0)*1500 + (tt.junior||0)*1000) * lecRate);
  // Use Firebase sales data if loaded, otherwise use manually entered data
  var selM = parseInt(document.getElementById('selMonth').value);
  var fbAmt = getFBSales(t.name, selM, store);
  var salesAmt = fbAmt > 0 ? fbAmt : (tt.sales||0);
  var salesPerf  = t.role !== 'sales' ? Math.round(salesAmt*0.02) : 0;
  var supFee     = (t.name==='зұійӣӘ' && store==='flagship') ? (tt.supHours||0)*(tt.supRate||0) : 0;
  var ptBasePay  = t.type==='part' ? (t.base||0)*ptHours : 0;
  var sub = countBonus + lectureFee + salesPerf + adminAmt + supFee + ptBasePay;

  return { countBonus, lectureFee, salesPerf, adminAmt, supFee, ptBasePay, ptHours, sub };
}

var dragSrcId = null;

function dragStart(e) {
  dragSrcId = e.currentTarget.dataset.id;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function dragOver(e) {
  e.preventDefault();
  var row = e.currentTarget;
  if (row.dataset.id !== dragSrcId) {
    document.querySelectorAll('#teacher-tbody tr').forEach(function(r){ r.classList.remove('drag-over'); });
    row.classList.add('drag-over');
  }
}

function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }

function dragDrop(e) {
  e.preventDefault();
  var targetId = e.currentTarget.dataset.id;
  if (!targetId || targetId===dragSrcId) {
    document.querySelectorAll('#teacher-tbody tr').forEach(function(r){ r.classList.remove('dragging','drag-over'); });
    return;
  }
  var srcIdx = S.teachers.findIndex(function(t){ return t.id===dragSrcId; });
  var tgtIdx = S.teachers.findIndex(function(t){ return t.id===targetId; });
  if (srcIdx!==-1 && tgtIdx!==-1) {
    var moved = S.teachers.splice(srcIdx,1)[0];
    S.teachers.splice(tgtIdx,0,moved);
    save(); renderTeacherList();
  }
}

      '<td><span class="badge ' + (t.type==='full'?'b-green':'b-gray') + '">' + TYPE_NAME[t.type] + '</span></td>' +

    return mainRow + editRow;

  el.innerHTML = '<table><thead><tr>' +
    '<th style="width:30px"></th><th>е§“еҗҚ</th><th>еҲҶеә—</th><th>иҒ·еҲҘ</th><th>иҒ·дҪҚ</th>' +

// в”Җв”Җ Download в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function dlExcel(store, mKey) {
  var teachers = getTeachers(store);
  var totals = aggregateMonth(store, mKey);
  var selY = parseInt(document.getElementById('selYear').value);
  var selM = parseInt(document.getElementById('selMonth').value);
  var days = getDaysInMonth(selY, selM);
  var wb = XLSX.utils.book_new();
  var sumData = [['Otto2 ARTCLUB ' + STORE_NAME[store] + ' жңҲе ұ - ' + mKey],[],
    ['е§“еҗҚ','иҒ·дҪҚ','дёҖиҲ¬дәәж¬Ў','еӨ–жҙҫдәәж¬Ў','еӨ–жҙҫдё»ж•ҷ','еӨ–жҙҫеҠ©ж•ҷ','е°ҸиҖҒеё«','и¬ӣеё«иІ»','жҘӯзёҫйҮ‘йЎҚ']];
  teachers.forEach(function(t) {
    var tt = totals.teachers[t.id]||{};
    var lec = (tt.master||0)*2000+(tt.assist||0)*1500+(tt.junior||0)*1000;
    sumData.push([t.name,ROLE_NAME[t.role||'teacher'],tt.count||0,tt.outsideCount||0,tt.master||0,tt.assist||0,tt.junior||0,lec,tt.sales||0]);
  });
  sumData.push([],['ж–°е®ў',totals.newCust,'иҲҠе®ў',totals.oldCust]);
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sumData), 'жңҲе ұ');
  var hdr = ['ж—Ҙжңҹ','ж–°е®ў','иҲҠе®ў'];
  teachers.forEach(function(t){ hdr.push(t.name+'дәәж¬Ў',t.name+'еӨ–жҙҫ',t.name+'жҘӯзёҫ'); });
  var dailyData = [hdr];
  for (var d=1;d<=days;d++) {
    var agg = getDayAgg(store, mKey, d);
    var row = [mKey+'-'+String(d).padStart(2,'0'), agg.newCust||0, agg.oldCust||0];
    teachers.forEach(function(t){ var td=agg.teachers[t.id]||{}; row.push(td.count||0,td.outsideCount||0,td.sales||0); });
    dailyData.push(row);
  }
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(dailyData), 'жҜҸж—ҘжҳҺзҙ°');
  XLSX.writeFile(wb, 'Otto2_' + STORE_NAME[store] + '_жңҲе ұ_' + mKey + '.xlsx');
}

function dlSalaryExcel(store, mKey) {
  var teachers = getTeachers(store);
  var bk = mKey+'_'+store;
  var isFlagship = store==='flagship';
  var hdr = ['е§“еҗҚ','иҒ·еҲҘ','дәәж¬ЎзҚҺйҮ‘','и¬ӣеё«иІ»','жҘӯзёҫзёҫж•Ҳ','иЎҢж”ҝзёҫж•Ҳ'];
  if(isFlagship) hdr.push('зұійӣӘж”ҜжҸҙиІ»');
  hdr.push('е…јиҒ·жҷӮи–ӘиІ»','е°ҸиЁҲ','еә•и–Ә','зёҪи–Ә');
  var rows = [['Otto2 ARTCLUB ' + STORE_NAME[store] + ' и–ӘиіҮ - ' + mKey],[],hdr];
  teachers.forEach(function(t) {
    var c = calcSalary(t, store, mKey);
    var base = t.type==='full' ? (S.salaryBase?.[bk]?.[t.id]||0) : 0;
    var row = [t.name,TYPE_NAME[t.type],c.countBonus,c.lectureFee,c.salesPerf,c.adminAmt];
    if(isFlagship) row.push(c.supFee);
    row.push(c.ptBasePay,c.sub,base,c.sub+base);
    rows.push(row);
  });
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), 'и–ӘиіҮжҳҺзҙ°');
  XLSX.writeFile(wb, 'Otto2_' + STORE_NAME[store] + '_и–ӘиіҮ_' + mKey + '.xlsx');
}

function dlPDF(store, mKey) {
  var teachers = getTeachers(store);

    return '<tr><td>'+t.name+'</td><td>'+ROLE_NAME[t.role||'teacher']+'</td><td>'+(tt.count||0)+'</td><td>'+(tt.outsideCount||0)+'</td><td>$'+lec.toLocaleString()+'</td><td>$'+(tt.sales||0).toLocaleString()+'</td></tr>';
